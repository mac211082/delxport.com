<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DELxPort — Live Price Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--ink:#17140F;--ink2:#1F1B15;--ink3:#2A241C;--line:#3A3229;--gold:#E3A230;--ivory:#F4ECDD;--mut:#B8AB95;--ok:#5FBF8F;--warn:#E0894A}
*{box-sizing:border-box}
body{margin:0;background:var(--ink);color:var(--ivory);font-family:"Space Grotesk",system-ui,sans-serif;line-height:1.5}
a{color:var(--gold)}
.wrap{max-width:560px;margin:0 auto;padding:32px 20px 80px}
.brand{display:flex;align-items:center;gap:10px;font-family:Fraunces,serif;font-weight:600;font-size:20px;letter-spacing:.3px;margin-bottom:6px}
.brand b{color:var(--gold)}
.tag{color:var(--mut);font-size:13px;margin-bottom:26px}
.card{background:linear-gradient(180deg,var(--ink2),var(--ink));border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:16px}
h1{font-family:Fraunces,serif;font-weight:600;font-size:26px;margin:0 0 4px}
h2{font-family:Fraunces,serif;font-weight:600;font-size:19px;margin:0 0 10px}
p{margin:0 0 12px;color:var(--mut)}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:14px 0 6px}
input,select,textarea{width:100%;background:var(--ink3);border:1px solid var(--line);color:var(--ivory);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit}
textarea{resize:vertical;min-height:64px;line-height:1.4}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold)}
label .opt{text-transform:none;letter-spacing:0;color:var(--mut);font-weight:400}
.grouplabel{margin:22px 0 2px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:18px;padding:13px 18px;border-radius:11px;border:1px solid var(--gold);background:var(--gold);color:#211a0e;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}
.btn.ghost{background:transparent;color:var(--gold)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:10px}.row>*{flex:1}
.muted{color:var(--mut);font-size:13px}
.switch{margin-top:16px;text-align:center;font-size:14px;color:var(--mut)}
.switch a{cursor:pointer;text-decoration:underline}
.msg{margin-top:14px;font-size:14px;padding:10px 12px;border-radius:9px;display:none}
.msg.err{display:block;background:rgba(224,80,60,.12);border:1px solid rgba(224,80,60,.4);color:#f0a08c}
.msg.ok{display:block;background:rgba(95,191,143,.12);border:1px solid rgba(95,191,143,.35);color:#8fe0b4}
.pill{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
.count{font-family:"IBM Plex Mono",monospace;font-size:42px;color:var(--gold);text-align:center;margin:8px 0}
.price{font-family:"IBM Plex Mono",monospace;font-size:34px;color:var(--gold);text-align:center;margin:6px 0}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
.kv:last-child{border-bottom:0}.kv span{color:var(--mut)}
.center{text-align:center}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.top .muted{cursor:pointer}
.setup{background:rgba(224,137,74,.1);border:1px solid rgba(224,137,74,.4);color:#e9b98c;border-radius:12px;padding:16px;font-size:14px}
.sitehead{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 20px;background:rgba(23,20,15,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.sitehead .brand{margin:0;font-size:18px}
.sitehead .sub{font-family:'Space Grotesk',sans-serif;color:var(--mut);font-weight:400;font-size:13px;margin-left:2px}
.acctwrap{position:relative}
.acct{display:inline-flex;align-items:center;gap:8px;max-width:220px;padding:8px 15px;border-radius:999px;border:1px solid var(--gold);background:var(--gold);color:#211a0e;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit}
.acct.in{background:transparent;color:var(--ivory);border-color:var(--line)}
.acct.in:hover{border-color:var(--gold)}
.acct .ael{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct svg{flex:none}
.acctmenu{display:none;position:absolute;right:0;top:calc(100% + 8px);min-width:214px;background:var(--ink2);border:1px solid var(--line);border-radius:13px;padding:8px;box-shadow:0 18px 50px -12px rgba(0,0,0,.6)}
.acctmenu.open{display:block}
.amrow{padding:7px 10px;font-size:13px;word-break:break-all}
.amout{width:100%;margin-top:6px;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--ink3);color:var(--ivory);font-weight:600;cursor:pointer;font-family:inherit;font-size:14px}
.amout:hover{border-color:var(--gold)}
</style>
</head>
<body>
<header class="sitehead">
  <div class="brand">DEL<b>x</b>Port <span class="sub">Live Price Desk</span></div>
  <div class="acctwrap">
    <button class="acct" id="acct" aria-haspopup="true" aria-expanded="false">Sign in</button>
    <div class="acctmenu" id="acctMenu" role="menu"></div>
  </div>
</header>
<div class="wrap">
  <div class="tag">AI-driven export quotes — for verified trade buyers.</div>
  <div id="app"><div class="card center muted">Loading…</div></div>
</div>

<script>
/* Boot watchdog: if the module never runs (e.g. an extension or network blocks
   Google Firebase), replace the endless "Loading…" with something actionable. */
window.__deskBoot = false;
setTimeout(function(){
  if (window.__deskBoot) return;
  var a = document.getElementById('app');
  if (a) a.innerHTML = '<div class="setup"><b>The sign-in desk didn\u2019t load.</b><br>'
    + 'This is almost always a browser extension (ad / privacy blocker) or a network blocking Google\u2019s Firebase service. '
    + 'Turn off blockers for delxport.com, or open this page in a private window or another browser, then reload.</div>';
}, 9000);
</script>

<script type="module">
const app$ = document.getElementById('app');
const esc0 = s => String(s==null?'':s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
const fatal = (title, detail) => { window.__deskBoot = true; app$.innerHTML = `<div class="setup"><b>${title}</b><br>${detail||''}</div>`; };

// Firebase SDK + config are loaded dynamically so a blocked/failed load surfaces
// as a readable message rather than a silent, permanent "Loading…".
let initializeApp, getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut;
let getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, onSnapshot;
let firebaseConfig, PRODUCTS, CONTAINERS, HOLD_MINUTES, FREE_EMAIL_RE, NOTIFY_NTFY_TOPIC, NOTIFY_WEBHOOK_URL;
async function loadSDK(){
  // Try Google's CDN first; if it's blocked (extension/network), fall back to jsDelivr.
  const sources = [
    ["https://www.gstatic.com/firebasejs/10.12.2/", ["firebase-app.js","firebase-auth.js","firebase-firestore.js"]],
    ["https://esm.run/firebase@10.12.2/", ["app","auth","firestore"]],
  ];
  let lastErr;
  for (const [base, names] of sources){
    try { return await Promise.all(names.map(n => import(base + n))); }
    catch (e) { lastErr = e; }
  }
  throw lastErr;
}
try {
  const [A, Au, Fs] = await loadSDK();
  const Cfg = await import("./firebase-config.js");
  ({ initializeApp } = A);
  ({ getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, signOut } = Au);
  ({ getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, onSnapshot } = Fs);
  ({ firebaseConfig, PRODUCTS, CONTAINERS, HOLD_MINUTES, FREE_EMAIL_RE, NOTIFY_NTFY_TOPIC, NOTIFY_WEBHOOK_URL } = Cfg);
} catch (e) {
  fatal('Couldn\u2019t reach the sign-in service.',
    'Your browser blocked or failed to load Firebase \u2014 usually an ad-blocker or privacy extension, or a restricted network. '
    + 'Turn off blockers for delxport.com (or try a private window / another browser), then reload. <span class="muted">['+esc0(e.message||e)+']</span>');
  throw e;
}
window.__deskBoot = true;

const qp = new URLSearchParams(location.search);
const wantProduct = qp.get('product');

// Guard: config not filled in yet
if (String(firebaseConfig.apiKey).startsWith('PASTE')) {
  fatal('Almost there.', 'This desk isn\u2019t connected to Firebase yet. Open <code>firebase-config.js</code>, paste your Firebase web config, and re-deploy.');
  throw new Error('firebase-config not set');
}

let app, auth, db;
try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
} catch (e) {
  fatal('Sign-in service failed to start.', esc0(e.message||e));
  throw e;
}
let quoteUnsub = null, ticker = null;

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ── Top-right account control (login / logout) ── */
const acctBtn = document.getElementById('acct');
const acctMenu = document.getElementById('acctMenu');
const personSvg = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.6 3.6-6 8-6s8 2.4 8 6"/></svg>';
function closeMenu(){ acctMenu.classList.remove('open'); acctBtn.setAttribute('aria-expanded','false'); }
function setAccount(user, prof){
  if (!user){
    acctBtn.className = 'acct';
    acctBtn.textContent = 'Sign in';
    acctBtn.onclick = () => { closeMenu(); renderAuth(); };
    acctMenu.innerHTML = ''; closeMenu();
    return;
  }
  acctBtn.className = 'acct in';
  acctBtn.innerHTML = personSvg + '<span class="ael">'+esc(user.email)+'</span>';
  acctBtn.onclick = (ev) => { ev.stopPropagation(); const open = acctMenu.classList.toggle('open'); acctBtn.setAttribute('aria-expanded', open?'true':'false'); };
  const statusPill = (prof && prof.status) ? `<div class="amrow"><span class="pill">${esc(prof.status)}</span></div>` : '';
  acctMenu.innerHTML = `<div class="amrow muted">${esc(user.email)}</div>${statusPill}<button class="amout" id="amout">Sign out</button>`;
  document.getElementById('amout').onclick = () => { closeMenu(); signOut(auth); };
}
document.addEventListener('click', (e) => {
  if (e.target !== acctBtn && !acctBtn.contains(e.target) && !acctMenu.contains(e.target)) closeMenu();
});

onAuthStateChanged(auth, async (user) => {
  if (quoteUnsub) { quoteUnsub(); quoteUnsub = null; }
  if (ticker) { clearInterval(ticker); ticker = null; }
  if (!user) { setAccount(null); return renderAuth(); }
  try { await user.reload(); } catch(e){}
  if (!auth.currentUser.emailVerified) { setAccount(user, null); return renderVerify(); }
  // Ensure profile doc
  const uref = doc(db, 'users', user.uid);
  let snap = await getDoc(uref);
  if (!snap.exists()) {
    const status = FREE_EMAIL_RE.test(user.email) ? 'pending' : 'approved';
    await setDoc(uref, { email: user.email, role: 'buyer', status, createdAt: serverTimestamp() });
    snap = await getDoc(uref);
  }
  const prof = snap.data();
  setAccount(user, prof);
  if (prof.status !== 'approved') return renderPending(prof);
  renderDesk();
});

/* ── Auth (login / signup) ── */
function renderAuth(mode='login'){
  const signup = mode === 'signup';
  app$.innerHTML = `
  <div class="card">
    <h1>${signup ? 'Create your buyer account' : 'Sign in'}</h1>
    <p>${signup ? 'Use your <b>company email</b>. Free inboxes (Gmail, Yahoo…) can register but need manual approval before quoting.' : 'Welcome back. Sign in to pull a live quote.'}</p>
    <label>Work email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@yourcompany.com">
    <label>Password</label>
    <input id="pw" type="password" autocomplete="${signup?'new-password':'current-password'}" placeholder="${signup?'At least 6 characters':'Your password'}">
    <button class="btn" id="go">${signup ? 'Create account' : 'Sign in'}</button>
    <div class="msg" id="msg"></div>
    <div class="switch">${signup
      ? `Already registered? <a id="sw">Sign in</a>`
      : `New buyer? <a id="sw">Create an account</a>`}</div>
  </div>`;
  const msg = document.getElementById('msg');
  const show = (t,ok)=>{ msg.className='msg '+(ok?'ok':'err'); msg.textContent=t; };
  document.getElementById('sw').onclick = ()=> renderAuth(signup?'login':'signup');
  document.getElementById('go').onclick = async ()=>{
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('pw').value;
    if (!email || !pw) return show('Enter your email and password.');
    document.getElementById('go').disabled = true;
    try{
      if (signup){
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await sendEmailVerification(cred.user);
      } else {
        await signInWithEmailAndPassword(auth, email, pw);
      }
    }catch(e){
      show(prettyErr(e)); document.getElementById('go').disabled = false;
    }
  };
}

/* ── Email verification wall ── */
function renderVerify(){
  app$.innerHTML = `
  <div class="card">
    <span class="pill">Step 2 of 2</span>
    <h1 style="margin-top:12px">Verify your email</h1>
    <p>We sent a verification link to <b>${esc(auth.currentUser.email)}</b>. Click it, then come back and continue.</p>
    <button class="btn" id="cont">I've verified — continue</button>
    <button class="btn ghost" id="resend">Resend link</button>
    <div class="msg" id="msg"></div>
    <div class="switch"><a id="out">Use a different account</a></div>
  </div>`;
  const msg = document.getElementById('msg');
  document.getElementById('cont').onclick = async ()=>{
    await auth.currentUser.reload();
    if (auth.currentUser.emailVerified) location.reload();
    else { msg.className='msg err'; msg.textContent='Not verified yet — check your inbox (and spam).'; }
  };
  document.getElementById('resend').onclick = async ()=>{
    try{ await sendEmailVerification(auth.currentUser); msg.className='msg ok'; msg.textContent='Link re-sent.'; }
    catch(e){ msg.className='msg err'; msg.textContent=prettyErr(e); }
  };
  document.getElementById('out').onclick = ()=> signOut(auth);
}

/* ── Pending approval ── */
function renderPending(prof){
  app$.innerHTML = `
  <div class="card center">
    <span class="pill" style="border-color:var(--warn);color:var(--warn)">${prof.status==='rejected'?'Not approved':'Pending approval'}</span>
    <h1 style="margin-top:14px">${prof.status==='rejected'?'Account not approved':'You\u2019re in the queue'}</h1>
    <p>${prof.status==='rejected'
        ? 'This account isn\u2019t cleared for quoting. If you think that\u2019s a mistake, reach out and we\u2019ll take a look.'
        : 'Because you registered with a free email, a person reviews the account before quotes open. You\u2019ll be cleared shortly \u2014 sign back in after that.'}</p>
    <button class="btn ghost" id="out">Sign out</button>
  </div>`;
  document.getElementById('out').onclick = ()=> signOut(auth);
}

/* ── RFQ option lists (all dropdowns, quick to tap) ── */
const GRADES = {
  rice:      ["1121 Golden Sella","1121 Steam","1121 White Sella","1121 Raw","1509 Sella","Sharbati Steam","Sona Masoori","PR11 / PR14 (non-basmati)","Not sure — please advise"],
  pulses:    ["Chana (chickpeas)","Toor / Arhar","Masoor (red lentil)","Moong (green gram)","Urad (black gram)","Kabuli chana","Yellow peas","Not sure — please advise"],
  spices:    ["Cumin / Jeera","Coriander seed","Turmeric","Red chilli","Black pepper","Mustard seed","Fennel / Saunf","Mixed — see notes","Not sure — please advise"],
  groceries: ["Basmati + staples mix","Atta / wheat flour","Sugar","Edible oil","Tea","Papad / snacks","Mixed — see notes"],
  hotels:    ["HORECA mixed container","Bulk staples (rice / pulses / oil)","Custom basket — see notes"]
};
const GRADES_DEFAULT = ["Standard grade","Premium grade","Not sure — please advise"];
const FIELDS = {
  qty:       ["1 container","2 containers","3–5 containers","6–10 containers","10+ containers","Recurring monthly"],
  dest:      ["UAE — Jebel Ali / Dubai","Saudi Arabia — Dammam / Jeddah","Qatar — Hamad","Kuwait — Shuwaikh","Oman — Sohar / Muscat","Bahrain","Singapore","Malaysia — Port Klang","Other — see notes"],
  incoterm:  ["FOB — Nhava Sheva","CIF — my destination port","CFR / C&F","EXW — Delhi ICD","Not sure — please advise"],
  packaging: ["PP woven bags (standard)","BOPP printed bags","Non-woven bags","Jute bags","Vacuum pack","Consumer retail packs","Your recommendation"],
  bag:       ["1 kg","5 kg","10 kg","25 kg","50 kg","Custom size — see notes"],
  brand:     ["Generic / unbranded","My brand (private label / custom bags)","DELxPort pack","Your recommendation"],
  payment:   ["100% advance (TT)","LC at sight","30% advance + balance vs docs","Flexible — please advise"],
  sample:    ["No — quote the container","Yes — send a sample first"]
};
const optsHtml = (arr, sel) => arr.map(o=>`<option value="${esc(o)}"${o===sel?' selected':''}>${esc(o)}</option>`).join('');
function gradesFor(p){ return GRADES[p] || GRADES_DEFAULT; }

/* ── The desk ── */
function renderDesk(){
  const prodOpts = Object.entries(PRODUCTS).map(([k,v])=>`<option value="${k}"${k===wantProduct?' selected':''}>${esc(v.name)}</option>`).join('');
  const startProd = (wantProduct && PRODUCTS[wantProduct]) ? wantProduct : Object.keys(PRODUCTS)[0];
  const cont = Object.keys(CONTAINERS).map(c=>`<option value="${c}">${c} · ~${CONTAINERS[c]} MT</option>`).join('');
  app$.innerHTML = `
  <div class="card">
    <h1>Request a live quote</h1>
    <p>A few quick taps so we quote the right spec. Your all-in price appears here the moment we approve it \u2014 usually within ${HOLD_MINUTES} minutes.</p>

    <div class="grouplabel">Product</div>
    <label>What do you want to import</label>
    <select id="prod">${prodOpts}</select>
    <label>Grade / variety</label>
    <select id="grade">${optsHtml(gradesFor(startProd))}</select>

    <div class="grouplabel">Order size</div>
    <div class="row">
      <div><label>Quantity</label><select id="qty">${optsHtml(FIELDS.qty)}</select></div>
      <div><label>Container</label><select id="cont">${cont}</select></div>
    </div>

    <div class="grouplabel">Shipping</div>
    <div class="row">
      <div><label>Destination</label><select id="dest">${optsHtml(FIELDS.dest)}</select></div>
      <div><label>Price basis</label><select id="incoterm">${optsHtml(FIELDS.incoterm)}</select></div>
    </div>

    <div class="grouplabel">Packing</div>
    <div class="row">
      <div><label>Packaging</label><select id="packaging">${optsHtml(FIELDS.packaging)}</select></div>
      <div><label>Bag size</label><select id="bag">${optsHtml(FIELDS.bag)}</select></div>
    </div>
    <label>Branding</label>
    <select id="brand">${optsHtml(FIELDS.brand)}</select>

    <div class="grouplabel">Terms</div>
    <div class="row">
      <div><label>Payment</label><select id="payment">${optsHtml(FIELDS.payment)}</select></div>
      <div><label>Sample</label><select id="sample">${optsHtml(FIELDS.sample)}</select></div>
    </div>

    <div class="grouplabel">Your details <span class="opt">(optional)</span></div>
    <div class="row">
      <div><label>Target price <span class="opt">(optional)</span></label><input id="target" placeholder="e.g. $980/MT"></div>
      <div><label>WhatsApp <span class="opt">(optional)</span></label><input id="wa" placeholder="+971…"></div>
    </div>
    <label>Anything else <span class="opt">(optional)</span></label>
    <textarea id="notes" placeholder="Custom bag print, specific brokens %, delivery deadline, port name…"></textarea>

    <button class="btn" id="go">Request live quote</button>
    <div class="msg" id="msg"></div>
  </div>`;

  // Grade options follow the selected product
  const prodSel = document.getElementById('prod');
  prodSel.onchange = ()=>{ document.getElementById('grade').innerHTML = optsHtml(gradesFor(prodSel.value)); };

  const v = id => (document.getElementById(id)?.value || '').trim();
  document.getElementById('go').onclick = async ()=>{
    const product = v('prod');
    const container = v('cont');
    document.getElementById('go').disabled = true;
    try{
      const ref = await addDoc(collection(db,'quotes'), {
        uid: auth.currentUser.uid, email: auth.currentUser.email,
        product, productName: PRODUCTS[product].name,
        container, mt: CONTAINERS[container],
        grade: v('grade'), quantity: v('qty'), destination: v('dest'),
        incoterms: v('incoterm'), packaging: v('packaging'), bagSize: v('bag'),
        branding: v('brand'), payment: v('payment'), sample: v('sample'),
        targetPrice: v('target'), whatsapp: v('wa'), notes: v('notes'),
        status: 'pending', createdAt: serverTimestamp()
      });
      notifyAdmin({ productName: PRODUCTS[product].name, container, email: auth.currentUser.email, destination: v('dest') });
      watchQuote(ref.id);
    }catch(e){
      const m=document.getElementById('msg'); m.className='msg err'; m.textContent=prettyErr(e);
      document.getElementById('go').disabled=false;
    }
  };
}


/* ── Watch a quote: countdown → reveal ── */
function watchQuote(id){
  if (quoteUnsub) quoteUnsub();
  quoteUnsub = onSnapshot(doc(db,'quotes',id), (snap)=>{
    if (!snap.exists()) return;
    const q = snap.data();
    const created = q.createdAt?.toMillis ? q.createdAt.toMillis() : Date.now();
    const revealAt = created + HOLD_MINUTES*60*1000;
    render();
    if (ticker) clearInterval(ticker);
    ticker = setInterval(render, 1000);
    function render(){
      const now = Date.now();
      const priced = q.fobUsdPerMt != null;
      const past = now >= revealAt;
      if (q.status==='rejected'){
        stop(); app$.innerHTML = shell(`<span class="pill" style="border-color:var(--warn);color:var(--warn)">Declined</span>
          <h1 style="margin-top:12px">Quote unavailable</h1>
          <p>We couldn\u2019t quote this line right now. Try another product or reach out directly.</p>
          <button class="btn" id="again">New request</button>`); wireAgain(); return;
      }
      if (priced){
        stop();
        const totalUsd = (q.fobUsdPerMt * q.mt);
        app$.innerHTML = shell(`<span class="pill" style="border-color:var(--ok);color:var(--ok)">Live quote ready</span>
          <h1 style="margin-top:12px">${esc(q.productName)}</h1>
          <div class="muted" style="margin-bottom:14px">${q.container} · ${q.mt} MT · FOB Nhava Sheva</div>
          <div class="price">$${fmt(q.fobUsdPerMt)}<span style="font-size:15px;color:var(--mut)"> /MT</span></div>
          <div class="kv"><span>Container total (FOB)</span><b>$${fmt(totalUsd)}</b></div>
          <div class="kv"><span>Volume</span><b>${q.mt} MT (${q.container})</b></div>
          <div class="kv"><span>Payment</span><b>100% advance or L/C</b></div>
          ${q.note?`<p style="margin-top:14px">${esc(q.note)}</p>`:''}
          <button class="btn" id="again">Request another</button>
          <div class="switch muted">This is your all-in FOB price. Reply to your quote email to book.</div>`);
        wireAgain(); return;
      }
      // still waiting
      const remain = Math.max(0, revealAt - now);
      const mm = String(Math.floor(remain/60000)).padStart(2,'0');
      const ss = String(Math.floor((remain%60000)/1000)).padStart(2,'0');
      const finalising = past && !priced;
      app$.innerHTML = shell(`<span class="pill">Preparing your quote</span>
        <h1 style="margin-top:12px">${esc(q.productName)}</h1>
        <div class="muted" style="margin-bottom:6px">${q.container} · ${q.mt} MT</div>
        ${finalising
          ? `<div class="center" style="padding:14px 0"><div class="muted">Locking today\u2019s rate…</div><div class="count">•••</div></div>
             <p class="center">Your desk is confirming the live rate. Hang on — it\u2019ll appear here the moment it\u2019s set.</p>`
          : `<div class="count">${mm}:${ss}</div>
             <p class="center">We\u2019re pricing against today\u2019s live market. Your FOB rate unlocks here — no need to refresh.</p>`}
        <button class="btn ghost" id="again">Start over</button>`);
      wireAgain();
    }
    function wireAgain(){ const b=document.getElementById('again'); if(b) b.onclick=()=>{ stop(); renderDesk(); }; }
    function stop(){ if(ticker){clearInterval(ticker);ticker=null;} }
  });
}

function shell(inner){ return `<div class="card">${inner}</div>`; }

const fmt = n => Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});

// Fire-and-forget admin alert when a quote is placed (works even if admin console is closed).
function notifyAdmin(q){
  const text = `New quote · ${q.productName} · ${q.container} · ${q.email}`;
  try{ if(NOTIFY_NTFY_TOPIC){
    fetch(`https://ntfy.sh/${encodeURIComponent(NOTIFY_NTFY_TOPIC)}`, {
      method:'POST', body:text,
      headers:{ 'Title':'DELxPort — new quote', 'Tags':'money_with_wings', 'Priority':'high' }
    }).catch(()=>{});
  }}catch(e){}
  try{ if(NOTIFY_WEBHOOK_URL){
    fetch(NOTIFY_WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ event:'new_quote', productName:q.productName, container:q.container, email:q.email, at:new Date().toISOString() }) }).catch(()=>{});
  }}catch(e){}
}
function prettyErr(e){
  const c=(e&&e.code)||''; 
  if(c.includes('email-already-in-use')) return 'That email already has an account — try signing in.';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return 'Email or password not recognised.';
  if(c.includes('weak-password')) return 'Password should be at least 6 characters.';
  if(c.includes('invalid-email')) return 'That doesn\u2019t look like a valid email.';
  if(c.includes('too-many-requests')) return 'Too many attempts — wait a moment and try again.';
  return (e&&e.message)||'Something went wrong.';
}
</script>
