<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DELxPort — Live Price Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--ink:#17140F;--ink2:#1F1B15;--ink3:#2A241C;--line:#3A3229;--gold:#E3A230;--ivory:#F4ECDD;--mut:#B8AB95;--ok:#5FBF8F;--warn:#E0894A}
*{box-sizing:border-box}
body{margin:0;background:var(--ink);color:var(--ivory);font-family:"Space Grotesk",system-ui,sans-serif;line-height:1.5}
a{color:var(--gold)}
.wrap{max-width:560px;margin:0 auto;padding:32px 20px 80px}
.brand{display:flex;align-items:center;gap:10px;font-family:Fraunces,serif;font-weight:600;font-size:20px;letter-spacing:.3px;margin-bottom:6px}
.brand b{color:var(--gold)}
.tag{color:var(--mut);font-size:13px;margin-bottom:26px}
.card{background:linear-gradient(180deg,var(--ink2),var(--ink));border:1px solid var(--line);border-radius:18px;padding:24px;margin-bottom:16px}
h1{font-family:Fraunces,serif;font-weight:600;font-size:26px;margin:0 0 4px}
h2{font-family:Fraunces,serif;font-weight:600;font-size:19px;margin:0 0 10px}
p{margin:0 0 12px;color:var(--mut)}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:14px 0 6px}
input,select{width:100%;background:var(--ink3);border:1px solid var(--line);color:var(--ivory);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:18px;padding:13px 18px;border-radius:11px;border:1px solid var(--gold);background:var(--gold);color:#211a0e;font-weight:600;font-size:15px;cursor:pointer;font-family:inherit}
.btn.ghost{background:transparent;color:var(--gold)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row{display:flex;gap:10px}.row>*{flex:1}
.muted{color:var(--mut);font-size:13px}
.switch{margin-top:16px;text-align:center;font-size:14px;color:var(--mut)}
.switch a{cursor:pointer;text-decoration:underline}
.msg{margin-top:14px;font-size:14px;padding:10px 12px;border-radius:9px;display:none}
.msg.err{display:block;background:rgba(224,80,60,.12);border:1px solid rgba(224,80,60,.4);color:#f0a08c}
.msg.ok{display:block;background:rgba(95,191,143,.12);border:1px solid rgba(95,191,143,.35);color:#8fe0b4}
.pill{display:inline-block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;padding:4px 10px;border-radius:999px;border:1px solid var(--line);color:var(--mut)}
.count{font-family:"IBM Plex Mono",monospace;font-size:42px;color:var(--gold);text-align:center;margin:8px 0}
.price{font-family:"IBM Plex Mono",monospace;font-size:34px;color:var(--gold);text-align:center;margin:6px 0}
.kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px}
.kv:last-child{border-bottom:0}.kv span{color:var(--mut)}
.center{text-align:center}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.top .muted{cursor:pointer}
.setup{background:rgba(224,137,74,.1);border:1px solid rgba(224,137,74,.4);color:#e9b98c;border-radius:12px;padding:16px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">DEL<b>x</b>Port · <span style="color:var(--mut);font-family:'Space Grotesk'">Live Price Desk</span></div>
  <div class="tag">AI-driven export quotes — for verified trade buyers.</div>
  <div id="app"><div class="card center muted">Loading…</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword,
         sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, onSnapshot }
         from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig, PRODUCTS, CONTAINERS, HOLD_MINUTES, FREE_EMAIL_RE, NOTIFY_NTFY_TOPIC, NOTIFY_WEBHOOK_URL } from "./firebase-config.js";

const app$ = document.getElementById('app');
const qp = new URLSearchParams(location.search);
const wantProduct = qp.get('product');

// Guard: config not filled in yet
if (String(firebaseConfig.apiKey).startsWith('PASTE')) {
  app$.innerHTML = `<div class="setup"><b>Almost there.</b><br>This desk isn't connected to Firebase yet. Open <code>firebase-config.js</code>, paste your Firebase web config, and re-deploy. Setup steps are in <code>PRICE-DESK-SETUP.md</code>.</div>`;
  throw new Error('firebase-config not set');
}

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let quoteUnsub = null, ticker = null;

const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

onAuthStateChanged(auth, async (user) => {
  if (quoteUnsub) { quoteUnsub(); quoteUnsub = null; }
  if (ticker) { clearInterval(ticker); ticker = null; }
  if (!user) return renderAuth();
  try { await user.reload(); } catch(e){}
  if (!auth.currentUser.emailVerified) return renderVerify();
  // Ensure profile doc
  const uref = doc(db, 'users', user.uid);
  let snap = await getDoc(uref);
  if (!snap.exists()) {
    const status = FREE_EMAIL_RE.test(user.email) ? 'pending' : 'approved';
    await setDoc(uref, { email: user.email, role: 'buyer', status, createdAt: serverTimestamp() });
    snap = await getDoc(uref);
  }
  const prof = snap.data();
  if (prof.status !== 'approved') return renderPending(prof);
  renderDesk();
});

/* ── Auth (login / signup) ── */
function renderAuth(mode='login'){
  const signup = mode === 'signup';
  app$.innerHTML = `
  <div class="card">
    <h1>${signup ? 'Create your buyer account' : 'Sign in'}</h1>
    <p>${signup ? 'Use your <b>company email</b>. Free inboxes (Gmail, Yahoo…) can register but need manual approval before quoting.' : 'Welcome back. Sign in to pull a live quote.'}</p>
    <label>Work email</label>
    <input id="email" type="email" autocomplete="email" placeholder="you@yourcompany.com">
    <label>Password</label>
    <input id="pw" type="password" autocomplete="${signup?'new-password':'current-password'}" placeholder="${signup?'At least 6 characters':'Your password'}">
    <button class="btn" id="go">${signup ? 'Create account' : 'Sign in'}</button>
    <div class="msg" id="msg"></div>
    <div class="switch">${signup
      ? `Already registered? <a id="sw">Sign in</a>`
      : `New buyer? <a id="sw">Create an account</a>`}</div>
  </div>`;
  const msg = document.getElementById('msg');
  const show = (t,ok)=>{ msg.className='msg '+(ok?'ok':'err'); msg.textContent=t; };
  document.getElementById('sw').onclick = ()=> renderAuth(signup?'login':'signup');
  document.getElementById('go').onclick = async ()=>{
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('pw').value;
    if (!email || !pw) return show('Enter your email and password.');
    document.getElementById('go').disabled = true;
    try{
      if (signup){
        const cred = await createUserWithEmailAndPassword(auth, email, pw);
        await sendEmailVerification(cred.user);
      } else {
        await signInWithEmailAndPassword(auth, email, pw);
      }
    }catch(e){
      show(prettyErr(e)); document.getElementById('go').disabled = false;
    }
  };
}

/* ── Email verification wall ── */
function renderVerify(){
  app$.innerHTML = `
  <div class="card">
    <span class="pill">Step 2 of 2</span>
    <h1 style="margin-top:12px">Verify your email</h1>
    <p>We sent a verification link to <b>${esc(auth.currentUser.email)}</b>. Click it, then come back and continue.</p>
    <button class="btn" id="cont">I've verified — continue</button>
    <button class="btn ghost" id="resend">Resend link</button>
    <div class="msg" id="msg"></div>
    <div class="switch"><a id="out">Use a different account</a></div>
  </div>`;
  const msg = document.getElementById('msg');
  document.getElementById('cont').onclick = async ()=>{
    await auth.currentUser.reload();
    if (auth.currentUser.emailVerified) location.reload();
    else { msg.className='msg err'; msg.textContent='Not verified yet — check your inbox (and spam).'; }
  };
  document.getElementById('resend').onclick = async ()=>{
    try{ await sendEmailVerification(auth.currentUser); msg.className='msg ok'; msg.textContent='Link re-sent.'; }
    catch(e){ msg.className='msg err'; msg.textContent=prettyErr(e); }
  };
  document.getElementById('out').onclick = ()=> signOut(auth);
}

/* ── Pending approval ── */
function renderPending(prof){
  app$.innerHTML = `
  <div class="card center">
    <span class="pill" style="border-color:var(--warn);color:var(--warn)">${prof.status==='rejected'?'Not approved':'Pending approval'}</span>
    <h1 style="margin-top:14px">${prof.status==='rejected'?'Account not approved':'You\u2019re in the queue'}</h1>
    <p>${prof.status==='rejected'
        ? 'This account isn\u2019t cleared for quoting. If you think that\u2019s a mistake, reach out and we\u2019ll take a look.'
        : 'Because you registered with a free email, a person reviews the account before quotes open. You\u2019ll be cleared shortly \u2014 sign back in after that.'}</p>
    <button class="btn ghost" id="out">Sign out</button>
  </div>`;
  document.getElementById('out').onclick = ()=> signOut(auth);
}

/* ── The desk ── */
function renderDesk(){
  const opts = Object.entries(PRODUCTS).map(([k,v])=>`<option value="${k}" ${k===wantProduct?'selected':''}>${esc(v.name)}</option>`).join('');
  const cont = Object.keys(CONTAINERS).map(c=>`<option value="${c}">${c} · ~${CONTAINERS[c]} MT</option>`).join('');
  app$.innerHTML = `
  <div class="top"><span class="pill">Signed in</span><span class="muted" id="out">Sign out</span></div>
  <div class="card">
    <h1>Request a live quote</h1>
    <p>Pick the product and container. We lock today\u2019s rate and your all-in FOB price appears in about ${HOLD_MINUTES} minutes.</p>
    <label>Product</label>
    <select id="prod">${opts}</select>
    <label>Container</label>
    <select id="cont">${cont}</select>
    <button class="btn" id="go">Request live quote</button>
    <div class="msg" id="msg"></div>
  </div>`;
  document.getElementById('out').onclick = ()=> signOut(auth);
  document.getElementById('go').onclick = async ()=>{
    const product = document.getElementById('prod').value;
    const container = document.getElementById('cont').value;
    document.getElementById('go').disabled = true;
    try{
      const ref = await addDoc(collection(db,'quotes'), {
        uid: auth.currentUser.uid, email: auth.currentUser.email,
        product, productName: PRODUCTS[product].name,
        container, mt: CONTAINERS[container],
        status: 'pending', createdAt: serverTimestamp()
      });
      notifyAdmin({ productName: PRODUCTS[product].name, container, email: auth.currentUser.email });
      watchQuote(ref.id);
    }catch(e){
      const m=document.getElementById('msg'); m.className='msg err'; m.textContent=prettyErr(e);
      document.getElementById('go').disabled=false;
    }
  };
}

/* ── Watch a quote: countdown → reveal ── */
function watchQuote(id){
  if (quoteUnsub) quoteUnsub();
  quoteUnsub = onSnapshot(doc(db,'quotes',id), (snap)=>{
    if (!snap.exists()) return;
    const q = snap.data();
    const created = q.createdAt?.toMillis ? q.createdAt.toMillis() : Date.now();
    const revealAt = created + HOLD_MINUTES*60*1000;
    render();
    if (ticker) clearInterval(ticker);
    ticker = setInterval(render, 1000);
    function render(){
      const now = Date.now();
      const priced = q.fobUsdPerMt != null;
      const past = now >= revealAt;
      if (q.status==='rejected'){
        stop(); app$.innerHTML = shell(`<span class="pill" style="border-color:var(--warn);color:var(--warn)">Declined</span>
          <h1 style="margin-top:12px">Quote unavailable</h1>
          <p>We couldn\u2019t quote this line right now. Try another product or reach out directly.</p>
          <button class="btn" id="again">New request</button>`); wireAgain(); return;
      }
      if (priced && past){
        stop();
        const totalUsd = (q.fobUsdPerMt * q.mt);
        app$.innerHTML = shell(`<span class="pill" style="border-color:var(--ok);color:var(--ok)">Live quote ready</span>
          <h1 style="margin-top:12px">${esc(q.productName)}</h1>
          <div class="muted" style="margin-bottom:14px">${q.container} · ${q.mt} MT · FOB Nhava Sheva</div>
          <div class="price">$${fmt(q.fobUsdPerMt)}<span style="font-size:15px;color:var(--mut)"> /MT</span></div>
          <div class="kv"><span>Container total (FOB)</span><b>$${fmt(totalUsd)}</b></div>
          <div class="kv"><span>Volume</span><b>${q.mt} MT (${q.container})</b></div>
          <div class="kv"><span>Payment</span><b>100% advance or L/C</b></div>
          ${q.note?`<p style="margin-top:14px">${esc(q.note)}</p>`:''}
          <button class="btn" id="again">Request another</button>
          <div class="switch muted">This is your all-in FOB price. Reply to your quote email to book.</div>`);
        wireAgain(); return;
      }
      // still waiting
      const remain = Math.max(0, revealAt - now);
      const mm = String(Math.floor(remain/60000)).padStart(2,'0');
      const ss = String(Math.floor((remain%60000)/1000)).padStart(2,'0');
      const finalising = past && !priced;
      app$.innerHTML = shell(`<span class="pill">Preparing your quote</span>
        <h1 style="margin-top:12px">${esc(q.productName)}</h1>
        <div class="muted" style="margin-bottom:6px">${q.container} · ${q.mt} MT</div>
        ${finalising
          ? `<div class="center" style="padding:14px 0"><div class="muted">Locking today\u2019s rate…</div><div class="count">•••</div></div>
             <p class="center">Your desk is confirming the live rate. Hang on — it\u2019ll appear here the moment it\u2019s set.</p>`
          : `<div class="count">${mm}:${ss}</div>
             <p class="center">We\u2019re pricing against today\u2019s live market. Your FOB rate unlocks here — no need to refresh.</p>`}
        <button class="btn ghost" id="again">Start over</button>`);
      wireAgain();
    }
    function wireAgain(){ const b=document.getElementById('again'); if(b) b.onclick=()=>{ stop(); renderDesk(); }; }
    function stop(){ if(ticker){clearInterval(ticker);ticker=null;} }
  });
}

function shell(inner){ return `<div class="top"><span class="pill">Signed in</span><span class="muted" onclick="return false" id="_o">Sign out</span></div><div class="card">${inner}</div>`; }
// re-bind sign out for shell views
document.addEventListener('click', e=>{ if(e.target && e.target.id==='_o') signOut(auth); });

const fmt = n => Number(n).toLocaleString('en-IN',{maximumFractionDigits:0});

// Fire-and-forget admin alert when a quote is placed (works even if admin console is closed).
function notifyAdmin(q){
  const text = `New quote · ${q.productName} · ${q.container} · ${q.email}`;
  try{ if(NOTIFY_NTFY_TOPIC){
    fetch(`https://ntfy.sh/${encodeURIComponent(NOTIFY_NTFY_TOPIC)}`, {
      method:'POST', body:text,
      headers:{ 'Title':'DELxPort — new quote', 'Tags':'money_with_wings', 'Priority':'high' }
    }).catch(()=>{});
  }}catch(e){}
  try{ if(NOTIFY_WEBHOOK_URL){
    fetch(NOTIFY_WEBHOOK_URL, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ event:'new_quote', productName:q.productName, container:q.container, email:q.email, at:new Date().toISOString() }) }).catch(()=>{});
  }}catch(e){}
}
function prettyErr(e){
  const c=(e&&e.code)||''; 
  if(c.includes('email-already-in-use')) return 'That email already has an account — try signing in.';
  if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return 'Email or password not recognised.';
  if(c.includes('weak-password')) return 'Password should be at least 6 characters.';
  if(c.includes('invalid-email')) return 'That doesn\u2019t look like a valid email.';
  if(c.includes('too-many-requests')) return 'Too many attempts — wait a moment and try again.';
  return (e&&e.message)||'Something went wrong.';
}
</script>
</body>
</html>
